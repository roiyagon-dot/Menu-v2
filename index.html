<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menú Semanal Vegano</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;--surface:#fffdf8;--surface2:#f0ebe0;
  --accent:#4a7c59;--accent2:#c17f3a;--accent3:#8b4a6b;
  --text:#2a2018;--text-muted:#7a6a58;--border:#d8cfc0;
  --protein:#c17f3a;--vegraw:#4a7c59;--vegcooked:#3a6e8b;--carbs:#8b4a6b;
  --shadow:0 2px 12px rgba(42,32,24,.08);--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
header{background:var(--text);color:var(--bg);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
header h1{font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:-.5px;white-space:nowrap}
header h1 span{color:var(--accent2);font-style:italic}
.header-tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab-btn{background:transparent;border:1px solid rgba(245,240,232,.3);color:var(--bg);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.82rem;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.tab-btn.active,.tab-btn:hover{background:var(--accent2);border-color:var(--accent2)}

/* ── Layout ── */
.container{max-width:1400px;margin:0 auto;padding:20px 16px}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── Week bar ── */
.week-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.week-bar h2{font-family:'Playfair Display',serif;font-size:1.2rem;flex:1;min-width:200px}
.week-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.85rem;color:var(--text);transition:all .2s}
.week-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.week-input{padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;transition:background .2s;white-space:nowrap}
.btn-primary:hover{background:#3a6347}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;transition:all .2s;white-space:nowrap}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* ── Legend ── */
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-muted)}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── Grid ── */
.week-grid{display:grid;grid-template-columns:80px repeat(7,1fr);gap:5px;overflow-x:auto}
.grid-header{background:var(--text);color:var(--bg);padding:7px 5px;border-radius:8px;text-align:center;font-size:.72rem;font-weight:500;letter-spacing:.3px}
.section-label{background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:.75rem;color:var(--accent);font-weight:500;padding:4px;min-height:28px;grid-column:1}
.section-spacer{grid-column:1/-1;height:6px}
.meal-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px;min-height:88px;position:relative;cursor:pointer;transition:box-shadow .2s}
.meal-cell:hover{box-shadow:var(--shadow)}
.meal-name{font-size:.78rem;font-weight:500;margin-bottom:5px;color:var(--text);line-height:1.3}
.meal-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:.65rem;padding:2px 5px;border-radius:10px;font-weight:500;white-space:nowrap}
.tag.protein{background:#fdf0e0;color:var(--protein);border:1px solid #f0d8b0}
.tag.vegraw{background:#e8f4ed;color:var(--vegraw);border:1px solid #b8d8c4}
.tag.vegcooked{background:#e0eef4;color:var(--vegcooked);border:1px solid #b0cedd}
.tag.carbs{background:#f4e8f0;color:var(--carbs);border:1px solid #d8b8cc}
.add-meal-btn{width:100%;height:100%;min-height:76px;background:transparent;border:1px dashed var(--border);border-radius:8px;cursor:pointer;color:var(--text-muted);font-size:1.3rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
.add-meal-btn:hover{border-color:var(--accent);color:var(--accent);background:#e8f4ed}
.delete-meal{position:absolute;top:3px;right:3px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.7rem;opacity:0;transition:opacity .2s;padding:2px 4px;border-radius:4px}
.meal-cell:hover .delete-meal{opacity:1}
.delete-meal:hover{color:#c0392b;background:#fde}
.view-recipe-btn{position:absolute;bottom:4px;right:4px;background:var(--surface2);border:none;cursor:pointer;color:var(--text-muted);font-size:.65rem;opacity:0;transition:opacity .2s;padding:2px 6px;border-radius:4px;font-family:'DM Sans',sans-serif}
.meal-cell:hover .view-recipe-btn{opacity:1}
.view-recipe-btn:hover{color:var(--accent);background:#e8f4ed}

/* ── Shopping ── */
.shopping-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.shopping-actions{display:flex;gap:8px;flex-wrap:wrap}
.shopping-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.shopping-section{background:var(--surface);border-radius:var(--radius);padding:14px}
.shopping-section h4{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px}
.shopping-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.85rem}
.shopping-item input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0}
.shopping-item.checked span{text-decoration:line-through;color:var(--text-muted)}
.no-ingredients{color:var(--text-muted);font-size:.9rem;font-style:italic;padding:40px;text-align:center}
.ios-export-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size autobiography:.82rem;color:var(--text);transition:all .2s;display:flex;align-items:center;gap:6px}
.ios-export-btn:hover{border-color:#555;background:#f0f0f0}

/* ── Recipes ── */
.recipes-header{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;min-width:160px}
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.recipe-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border);transition:box-shadow .2s}
.recipe-card:hover{box-shadow:var(--shadow)}
.recipe-card h4{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:7px}
.recipe-card .tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.recipe-card .ingredients-preview{font-size:.76rem;color:var(--text-muted);line-height:1.5;margin-bottom:10px}
.recipe-card-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-xs{font-size:.73rem;padding:4px 9px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:var(--bg);color:var(--text);transition:all .2s;white-space:nowrap}
.btn-xs:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-xs.danger:hover{background:#c0392b;border-color:#c0392b;color:#fff}
.btn-xs.view{background:#e8f4ed;color:var(--accent);border-color:#b8d8c4}
.btn-xs.view:hover{background:var(--accent);color:#fff}

/* ── Modals ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,32,24,.5);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:24px;max-width:520px;width:100%;box-shadow:0 8px 40px rgba(42,32,24,.2);max-height:90vh;overflow-y:auto}
.modal h3{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.82rem;font-weight:500;margin-bottom:4px;color:var(--text-muted)}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group textarea{min-height:80px;resize:vertical}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.input-wrap{position:relative}
.autocomplete-list{position:absolute;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);z-index:200;max-height:180px;overflow-y:auto;top:100%;left:0}
.autocomplete-item{padding:8px 12px;cursor:pointer;font-size:.83rem;transition:background .15s}
.autocomplete-item:hover{background:var(--surface2)}
.autocomplete-item small{color:var(--text-muted);font-size:.72rem;display:block}

/* ── Recipe view modal ── */
.recipe-view-modal .modal{max-width:600px}
.recipe-view-title{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:4px}
.recipe-view-subtitle{color:var(--text-muted);font-size:.85rem;margin-bottom:16px}
.recipe-view-body{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:480px){.recipe-view-body{grid-template-columns:1fr}}
.recipe-section h5{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.ingredient-list{list-style:none;padding:0}
.ingredient-list li{font-size:.85rem;padding:3px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.ingredient-list li::before{content:'·';color:var(--accent);font-size:1.1rem}
.steps-list{list-style:none;padding:0;counter-reset:steps}
.steps-list li{font-size:.85rem;padding:6px 0;padding-left:28px;position:relative;counter-increment:steps;border-bottom:1px solid var(--border);line-height:1.5}
.steps-list li::before{content:counter(steps);position:absolute;left:0;top:6px;background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600}
.recipe-notes{background:var(--surface2);border-radius:8px;padding:10px 12px;font-size:.82rem;color:var(--text-muted);font-style:italic;margin-top:12px;grid-column:1/-1}
.macro-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;grid-column:1/-1}

/* ── Notification ── */
.notif{position:fixed;bottom:20px;right:20px;background:var(--text);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:.87rem;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;max-width:280px}
.notif.show{transform:translateY(0);opacity:1}

/* ── Mobile ── */
@media(max-width:700px){
  .week-grid{grid-template-columns:54px repeat(7,minmax(70px,1fr));font-size:.7rem}
  .grid-header{font-size:.65rem;padding:5px 2px}
  .meal-cell{min-height:70px;padding:5px}
  .meal-name{font-size:.7rem}
  header{padding:10px 14px}
  header h1{font-size:1.1rem}
  .container{padding:12px 10px}
  .shopping-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:420px){
  .shopping-grid{grid-template-columns:1fr}
  .week-bar h2{font-size:1rem}
}
</style>
</head>
<body>

<header>
  <h1>🌿 Menú <span>Semanal</span></h1>
  <div class="header-tabs">
    <button class="tab-btn active" onclick="showTab('planner')">Planificador</button>
    <button class="tab-btn" onclick="showTab('shopping')">🛒 Compra</button>
    <button class="tab-btn" onclick="showTab('recipes')">📖 Recetas</button>
  </div>
</header>

<div class="container">

<div id="tab-planner" class="tab-content active">
  <div class="week-bar">
    <button class="week-btn" onclick="prevWeek()">◀</button>
    <h2 id="week-label">—</h2>
    <button class="week-btn" onclick="nextWeek()">▶</button>
    <input type="date" id="week-start" class="week-input" onchange="jumpToWeek()">
    <button class="btn-primary" onclick="generateShopping()">🛒 Generar lista</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--protein)"></div>Proteína</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--vegraw)"></div>Verdura cruda</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--vegcooked)"></div>Verdura cocinada</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--carbs)"></div>Hidratos</div>
  </div>

  <div class="week-grid" id="week-grid"></div>
</div>

<div id="tab-shopping" class="tab-content">
  <div class="shopping-header">
    <div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.3rem">Lista de la compra</h2>
      <p style="color:var(--text-muted);font-size:.82rem;margin-top:3px" id="shopping-subtitle">Genera la lista desde el planificador 🌿</p>
    </div>
    <div class="shopping-actions">
      <button class="btn-secondary" onclick="generateShopping()">🔄 Actualizar</button>
      <button class="ios-export-btn" onclick="exportToReminders()" title="Exportar a Recordatorios de iPhone">📱 Recordatorios</button>
      <button class="btn-xs danger" onclick="clearShoppingChecks()" style="padding:7px 12px; border-radius:8px">Desmarcar todo</button>
    </div>
  </div>
  <div class="shopping-grid" id="shopping-grid"></div>
</div>

<div id="tab-recipes" class="tab-content">
  <div class="recipes-header">
    <input type="text" id="recipe-search" class="search-input" placeholder="Buscar recetas por nombre o ingrediente..." oninput="renderRecipes()">
    <button class="btn-primary" onclick="openRecipeModal()">➕ Nueva Receta</button>
  </div>
  <div class="recipes-grid" id="recipes-grid"></div>
</div>

</div> <div class="modal-overlay" id="meal-modal">
  <div class="modal">
    <h3 id="meal-modal-title">Editar Comida</h3>
    <input type="hidden" id="meal-day">
    <input type="hidden" id="meal-slot">
    
    <div class="form-group">
      <label>Nombre del plato</label>
      <div class="input-wrap">
        <input type="text" id="meal-name-input" placeholder="Ej. Lentejas con verduras" autocomplete="off" oninput="handleMealSearch(this.value)">
        <div class="autocomplete-list" id="meal-auto-list" style="display:none"></div>
      </div>
    </div>
    
    <div class="form-group">
      <label>Categorías del plato (Filtros de color)</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
        <label style="font-weight:normal;display:flex;align-items:center;gap:6px"><input type="checkbox" id="chk-protein" style="accent-color:var(--protein)"> Proteína</label>
        <label style="font-weight:normal;display:flex;align-items:center;gap:6px"><input type="checkbox" id="chk-vegraw" style="accent-color:var(--vegraw)"> Verdura Cruda</label>
        <label style="font-weight:normal;display:flex;align-items:center;gap:6px"><input type="checkbox" id="chk-vegcooked" style="accent-color:var(--vegcooked)"> Verdura Cocinada</label>
        <label style="font-weight:normal;display:flex;align-items:center;gap:6px"><input type="checkbox" id="chk-carbs" style="accent-color:var(--carbs)"> Hidratos</label>
      </div>
    </div>
    
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeMealModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveMeal()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="recipe-modal">
  <div class="modal">
    <h3 id="recipe-modal-title">Añadir Receta</h3>
    <input type="hidden" id="recipe-id-input">
    
    <div class="form-group">
      <label>Nombre de la receta *</label>
      <input type="text" id="rec-title" placeholder="Ej. Hamburguesas de garbanzo">
    </div>
    
    <div class="form-group">
      <label>Ingredientes (Uno por línea con su sección opcional, ej: [Verdulería] 2 Tomates) *</label>
      <textarea id="rec-ingredients" placeholder="[Legumbres] 1 bote de garbanzos&#10;[Verdulería] 1 cebolla&#10;1 cdta de comino"></textarea>
    </div>
    
    <div class="form-group">
      <label>Pasos de preparación (Uno por línea)</label>
      <textarea id="rec-steps" placeholder="Triturar los garbanzos con la cebolla.&#10;Dar forma y dorar en la sartén."></textarea>
    </div>
    
    <div class="form-group">
      <label>Notas adicionales o Macros</label>
      <input type="text" id="rec-notes" placeholder="Quedan mejor si dejas reposar la masa.">
    </div>
    
    <div class="form-group">
      <label>Etiquetas por defecto</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <label style="font-weight:normal;display:flex;align-items:center;gap:6px"><input type="checkbox" id="rchk-protein"> Proteína</label>
        <label style="font-weight:normal;display:flex;align-items:center;gap:6px"><input type="checkbox" id="rchk-vegraw"> Verdura Cruda</label>
        <label style="font-weight:normal;display:flex;align-items:center;gap:6px"><input type="checkbox" id="rchk-vegcooked"> Verdura Cocinada</label>
        <label style="font-weight:normal;display:flex;align-items:center;gap:6px"><input type="checkbox" id="rchk-carbs"> Hidratos</label>
      </div>
    </div>
    
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeRecipeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveRecipe()">Guardar Receta</button>
    </div>
  </div>
</div>

<div class="modal-overlay recipe-view-modal" id="recipe-view-modal">
  <div class="modal">
    <div class="recipe-view-title" id="v-title">Título</div>
    <div class="recipe-view-subtitle" id="v-subtitle">Macros / Tags</div>
    <div class="macro-pills" id="v-pills"></div>
    
    <div class="recipe-view-body">
      <div class="recipe-section">
        <h5>Ingredientes</h5>
        <ul class="ingredient-list" id="v-ingredients"></ul>
      </div>
      <div class="recipe-section">
        <h5>Preparación</h5>
        <ol class="steps-list" id="v-steps"></ol>
      </div>
    </div>
    <div class="recipe-notes" id="v-notes"></div>
    
    <div class="modal-actions">
      <button class="btn-primary" onclick="closeViewModal()">Entendido</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ══════════════════════════════════════════
// DATA STATE & STORES
// ══════════════════════════════════════════
let state = {
  currentWeekStart: "", 
  planner: {},          
  recipes: [],          
  shoppingChecks: {}    
};

const DAYS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
const SLOTS = [
  { id: "comida_plato", label: "Comida" },
  { id: "comida_verdura", label: "Verdura" },
  { id: "comida_prote", label: "Proteína" },
  { id: "comida_carbo", label: "Hidratos" },
  { id: "spacer_1", isSpacer: true },
  { id: "cena_plato", label: "Cena" },
  { id: "cena_verdura", label: "Verdura" },
  { id: "cena_prote", label: "Proteína" },
  { id: "cena_carbo", label: "Hidratos" }
];

// ══════════════════════════════════════════
// LOCALSTORAGE CORE
// ══════════════════════════════════════════
function loadLocalData() {
  try {
    const p = localStorage.getItem("vegan_planner_data");
    if(p) state.planner = JSON.parse(p);
    
    const r = localStorage.getItem("vegan_recipes_data");
    if(r) state.recipes = JSON.parse(r);
    else state.recipes = getMockRecipes(); 
    
    const c = localStorage.getItem("vegan_shopping_checks");
    if(c) state.shoppingChecks = JSON.parse(c);
  } catch(e) {
    console.error("Error cargando LocalStorage", e);
  }
}

function saveLocalData() {
  localStorage.setItem("vegan_planner_data", JSON.stringify(state.planner));
  localStorage.setItem("vegan_recipes_data", JSON.stringify(state.recipes));
  localStorage.setItem("vegan_shopping_checks", JSON.stringify(state.shoppingChecks));
}

// ══════════════════════════════════════════
// CALENDAR MECHANICS
// ══════════════════════════════════════════
function initCalendar() {
  if (!state.currentWeekStart) {
    const d = new Date();
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
    const monday = new Date(d.setDate(diff));
    state.currentWeekStart = formatDate(monday);
  }
  updateWeekUI();
}

function updateWeekUI() {
  const start = parseDate(state.currentWeekStart);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  
  document.getElementById('week-label').textContent = `${start.getDate()} ${getMonthName(start)} — ${end.getDate()} ${getMonthName(end)} ${end.getFullYear()}`;
  document.getElementById('week-start').value = state.currentWeekStart;
  
  renderGrid();
}

function prevWeek() { moveWeek(-7); }
function nextWeek() { moveWeek(7); }
function moveWeek(days) {
  const d = parseDate(state.currentWeekStart);
  d.setDate(d.getDate() + days);
  state.currentWeekStart = formatDate(d);
  updateWeekUI();
}
function jumpToWeek() {
  const val = document.getElementById('week-start').value;
  if(val) {
    const d = parseDate(val);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    state.currentWeekStart = formatDate(new Date(d.setDate(diff)));
    updateWeekUI();
  }
}

// ══════════════════════════════════════════
// RENDER PLANNER GRID
// ══════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = "";
  
  const corner = el('div', 'grid-header');
  corner.textContent = "Categoría";
  grid.appendChild(corner);
  
  const start = parseDate(state.currentWeekStart);
  for(let i=0; i<7; i++) {
    const curr = new Date(start);
    curr.setDate(start.getDate() + i);
    const h = el('div', 'grid-header');
    h.innerHTML = `${DAYS[i]}<br><span style="font-weight:300;opacity:0.8;font-size:0.65rem">${curr.getDate()}/${curr.getMonth()+1}</span>`;
    grid.appendChild(h);
  }
  
  const weekKey = state.currentWeekStart;
  const weekData = state.planner[weekKey] || {};
  
  SLOTS.forEach((slot, slotIdx) => {
    if(slot.isSpacer) {
      grid.appendChild(el('div', 'section-spacer'));
      return;
    }
    
    const label = el('div', 'section-label');
    label.textContent = slot.label;
    grid.appendChild(label);
    
    for(let dayIdx=0; dayIdx<7; dayIdx++) {
      const cellKey = `${dayIdx}_${slotIdx}`;
      const meal = weekData[cellKey];
      const cell = el('div', 'meal-cell');
      
      if(meal && meal.name) {
        cell.onclick = () => openMealModal(dayIdx, slotIdx, meal);
        
        const nameEl = el('div', 'meal-name');
        nameEl.textContent = meal.name;
        cell.appendChild(nameEl);
        
        const tagsEl = el('div', 'meal-tags');
        if(meal.tags && meal.tags.length) {
          meal.tags.forEach(t => {
            const tEl = el('span', `tag ${t}`);
            tEl.textContent = translateTag(t);
            tagsEl.appendChild(tEl);
          });
        }
        cell.appendChild(tagsEl);
        
        const del = el('button', 'delete-meal');
        del.innerHTML = "✕";
        del.onclick = (e) => { e.stopPropagation(); deleteMeal(dayIdx, slotIdx); };
        cell.appendChild(del);
        
        const recipe = state.recipes.find(r => r.title.toLowerCase().trim() === meal.name.toLowerCase().trim());
        if(recipe) {
          const vBtn = el('button', 'view-recipe-btn');
          vBtn.textContent = "Receta";
          vBtn.onclick = (e) => { e.stopPropagation(); openViewModal(recipe.id); };
          cell.appendChild(vBtn);
        }
      } else {
        cell.onclick = () => openMealModal(dayIdx, slotIdx, null);
        const addBtn = el('button', 'add-meal-btn');
        addBtn.textContent = "+";
        cell.appendChild(addBtn);
      }
      grid.appendChild(cell);
    }
  });
}

// ══════════════════════════════════════════
// MEAL EDITOR MECHANICS
// ══════════════════════════════════════════
function openMealModal(day, slot, meal) {
  document.getElementById('meal-day').value = day;
  document.getElementById('meal-slot').value = slot;
  document.getElementById('meal-modal-title').textContent = `${SLOTS[slot].label} del ${DAYS[day]}`;
  
  const nameInp = document.getElementById('meal-name-input');
  nameInp.value = meal ? meal.name : "";
  
  ['protein','vegraw','vegcooked','carbs'].forEach(t => {
    document.getElementById(`chk-${t}`).checked = meal ? (meal.tags || []).includes(t) : false;
  });
  
  document.getElementById('meal-auto-list').style.display = "none";
  document.getElementById('meal-modal').classList.add('open');
  nameInp.focus();
}

function closeMealModal() { document.getElementById('meal-modal').classList.remove('open'); }

function handleMealSearch(val) {
  const list = document.getElementById('meal-auto-list');
  list.innerHTML = "";
  if(!val.trim()) { list.style.display = "none"; return; }
  
  const matches = state.recipes.filter(r => r.title.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
  if(!matches.length) { list.style.display = "none"; return; }
  
  matches.forEach(r => {
    const item = el('div', 'autocomplete-item');
    item.innerHTML = `<strong>${r.title}</strong><small>${(r.tags||[]).map(translateTag).join(', ')}</small>`;
    item.onclick = () => {
      document.getElementById('meal-name-input').value = r.title;
      ['protein','vegraw','vegcooked','carbs'].forEach(t => {
        document.getElementById(`chk-${t}`).checked = (r.tags || []).includes(t);
      });
      list.style.display = "none";
    };
    list.appendChild(item);
  });
  list.style.display = "block";
}

function saveMeal() {
  const day = document.getElementById('meal-day').value;
  const slot = document.getElementById('meal-slot').value;
  const name = document.getElementById('meal-name-input').value.trim();
  
  if(!name) { closeMealModal(); return; }
  
  const tags = [];
  ['protein','vegraw','vegcooked','carbs'].forEach(t => {
    if(document.getElementById(`chk-${t}`).checked) tags.push(t);
  });
  
  const weekKey = state.currentWeekStart;
  if(!state.planner[weekKey]) state.planner[weekKey] = {};
  
  state.planner[weekKey][`${day}_${slot}`] = { name, tags };
  
  saveLocalData();
  renderGrid();
  closeMealModal();
  notify("Plato guardado");
}

function deleteMeal(day, slot) {
  const weekKey = state.currentWeekStart;
  if(state.planner[weekKey]) {
    delete state.planner[weekKey][`${day}_${slot}`];
    saveLocalData();
    renderGrid();
    notify("Plato eliminado");
  }
}

// ══════════════════════════════════════════
// SHOPPING GENERATOR ENGINE
// ══════════════════════════════════════════
function generateShopping() {
  const weekKey = state.currentWeekStart;
  const weekData = state.planner[weekKey] || {};
  
  const plannedNames = Object.values(weekData).map(m => m.name.toLowerCase().trim());
  if(!plannedNames.length) {
    document.getElementById('shopping-grid').innerHTML = `<div class="no-ingredients">No hay platos añadidos en esta semana. Añade platos al planificador primero para estructurar tu compra.</div>`;
    document.getElementById('shopping-subtitle').textContent = "Ningún plato planificado";
    showTab('shopping');
    return;
  }
  
  const sections = {}; 
  
  plannedNames.forEach(name => {
    const r = state.recipes.find(rec => rec.title.toLowerCase().trim() === name);
    if(r && r.ingredients) {
      r.ingredients.forEach(ing => {
        let cat = "Otros de Despensa";
        let cleanIng = ing.trim();
        
        if(ing.startsWith("[")) {
          const idx = ing.indexOf("]");
          if(idx > 1) {
            cat = ing.substring(1, idx).trim();
            cleanIng = ing.substring(idx + 1).trim();
          }
        }
        if(!sections[cat]) sections[cat] = [];
        if(!sections[cat].includes(cleanIng)) sections[cat].push(cleanIng);
      });
    }
  });

  const grid = document.getElementById('shopping-grid');
  grid.innerHTML = "";
  
  const categories = Object.keys(sections).sort();
  if(!categories.length) {
    grid.innerHTML = `<div class="no-ingredients">Los platos planificados no tienen recetas detalladas creadas en la pestaña "Recetas".</div>`;
    document.getElementById('shopping-subtitle').textContent = "Lista vacía";
    showTab('shopping');
    return;
  }
  
  categories.forEach(cat => {
    const box = el('div', 'shopping-section');
    const title = el('h4');
    title.textContent = cat;
    box.appendChild(title);
    
    sections[cat].forEach(ing => {
      const item = el('label', 'shopping-item');
      const isChecked = !!state.shoppingChecks[ing];
      if(isChecked) item.classList.add('checked');
      
      const chk = el('input');
      chk.type = "checkbox";
      chk.checked = isChecked;
      chk.onchange = () => {
        state.shoppingChecks[ing] = chk.checked;
        if(chk.checked) item.classList.add('checked');
        else item.classList.remove('checked');
        saveLocalData();
      };
      
      const span = el('span');
      span.textContent = ing;
      
      item.appendChild(chk);
      item.appendChild(span);
      box.appendChild(item);
    });
    grid.appendChild(box);
  });
  
  document.getElementById('shopping-subtitle').textContent = `Compra de la semana del ${weekKey}`;
  showTab('shopping');
}

function clearShoppingChecks() {
  state.shoppingChecks = {};
  saveLocalData();
  const weekKey = state.currentWeekStart;
  if(state.planner[weekKey] && Object.keys(state.planner[weekKey]).length) {
    generateShopping();
  }
  notify("Checks limpiados");
}

function exportToReminders() {
  const items = [];
  document.querySelectorAll('.shopping-item:not(.checked) span').forEach(s => items.push(s.textContent));
  if(!items.length) { alert("No hay artículos sin marcar para exportar."); return; }
  
  const text = items.join('\n');
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert("¡Lista copiada!\n\nAbre la app 'Recordatorios' de tu iPhone, crea una lista vacía y dale a 'Pegar'.");
    });
  } else {
    alert("Copia el texto manualmente:\n\n" + text);
  }
}

// ══════════════════════════════════════════
// RECIPES MANAGEMENT CORE
// ══════════════════════════════════════════
function renderRecipes() {
  const grid = document.getElementById('recipes-grid');
  grid.innerHTML = "";
  const query = document.getElementById('recipe-search').value.toLowerCase().trim();
  
  const filtered = state.recipes.filter(r => {
    return r.title.toLowerCase().includes(query) || 
           (r.ingredients || []).some(i => i.toLowerCase().includes(query));
  });
  
  filtered.sort((a,b) => a.title.localeCompare(b.title)).forEach(r => {
    const card = el('div', 'recipe-card');
    
    const title = el('h4');
    title.textContent = r.title;
    card.appendChild(title);
    
    const tags = el('div', 'tags');
    if(r.tags && r.tags.length) {
      r.tags.forEach(t => {
        const span = el('span', `tag ${t}`);
        span.textContent = translateTag(t);
        tags.appendChild(span);
      });
    }
    card.appendChild(tags);
    
    const prev = el('div', 'ingredients-preview');
    prev.textContent = r.ingredients && r.ingredients.length ? 
      r.ingredients.map(i => i.replace(/^\[.*?\]/, '').trim()).slice(0, 3).join(', ') + (r.ingredients.length > 3 ? '...' : '') : 
      'Sin ingredientes';
    card.appendChild(prev);
    
    const actions = el('div', 'recipe-card-actions');
    
    const vBtn = el('button', 'btn-xs view');
    vBtn.textContent = "Ver Receta";
    vBtn.onclick = () => openViewModal(r.id);
    actions.appendChild(vBtn);
    
    const eBtn = el('button', 'btn-xs');
    eBtn.textContent = "Editar";
    eBtn.onclick = () => openRecipeModal(r);
    actions.appendChild(eBtn);
    
    const dBtn = el('button', 'btn-xs danger');
    dBtn.textContent = "Borrar";
    dBtn.onclick = () => deleteRecipe(r.id);
    actions.appendChild(dBtn);
    
    card.appendChild(actions);
    grid.appendChild(card);
  });
}

function openRecipeModal(recipe = null) {
  document.getElementById('recipe-id-input').value = recipe ? recipe.id : "";
  document.getElementById('recipe-modal-title').textContent = recipe ? "Editar Receta" : "Añadir Receta";
  
  document.getElementById('rec-title').value = recipe ? recipe.title : "";
  document.getElementById('rec-ingredients').value = recipe ? (recipe.ingredients || []).join('\n') : "";
  document.getElementById('rec-steps').value = recipe ? (recipe.steps || []).join('\n') : "";
  document.getElementById('rec-notes').value = recipe ? recipe.notes || "" : "";
  
  ['protein','vegraw','vegcooked','carbs'].forEach(t => {
    document.getElementById(`rchk-${t}`).checked = recipe ? (recipe.tags || []).includes(t) : false;
  });
  
  document.getElementById('recipe-modal').classList.add('open');
}

function closeRecipeModal() { document.getElementById('recipe-modal').classList.remove('open'); }

function saveRecipe() {
  const id = document.getElementById('recipe-id-input').value;
  const title = document.getElementById('rec-title').value.trim();
  const ingText = document.getElementById('rec-ingredients').value.trim();
  const stepsText = document.getElementById('rec-steps').value.trim();
  const notes = document.getElementById('rec-notes').value.trim();
  
  if(!title || !ingText) { alert("Título e Ingredientes obligatorios"); return; }
  
  const ingredients = ingText.split('\n').map(l => l.trim()).filter(l => l);
  const steps = stepsText.split('\n').map(l => l.trim()).filter(l => l);
  
  const tags = [];
  ['protein','vegraw','vegcooked','carbs'].forEach(t => {
    if(document.getElementById(`rchk-${t}`).checked) tags.push(t);
  });
  
  if(id) {
    const idx = state.recipes.findIndex(r => r.id === id);
    if(idx >= 0) state.recipes[idx] = { id, title, ingredients, steps, notes, tags };
  } else {
    const newId = "rec_" + Date.now();
    state.recipes.push({ id: newId, title, ingredients, steps, notes, tags });
  }
  
  saveLocalData();
  renderRecipes();
  renderGrid(); 
  closeRecipeModal();
  notify("Receta guardada");
}

function deleteRecipe(id) {
  if(confirm("¿Seguro que quieres borrar esta receta?")) {
    state.recipes = state.recipes.filter(r => r.id !== id);
    saveLocalData();
    renderRecipes();
    renderGrid();
    notify("Receta borrada");
  }
}

function closeViewModal() { document.getElementById('recipe-view-modal').classList.remove('open'); }

function showTab(name){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const idx=['planner','shopping','recipes'].indexOf(name);
  if(idx>=0)document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if(name==='recipes')renderRecipes();
}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function notify(msg){const n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2800);}

// Cierre de ventanas modales clicando fuera
['meal-modal','recipe-modal','recipe-view-modal'].forEach(id=>{
  const elem = document.getElementById(id);
  if (elem) {
    elem.addEventListener('click', e => {
      if(e.target.id === id){
        if(id === 'meal-modal') closeMealModal();
        else if(id === 'recipe-modal') closeRecipeModal();
        else if(id === 'recipe-view-modal') closeViewModal();
      }
    });
  }
});

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function parseDate(str) {
  const parts = str.split('-');
  return new Date(parts[0], parts[1] - 1, parts[2]);
}
function getMonthName(d) {
  return d.toLocaleString('es', { month: 'short' }).replace('.', '');
}
function translateTag(t) {
  const m = { protein: "Proteína", vegraw: "Verdura Cruda", vegcooked: "Verdura Cocinada", carbs: "Hidratos" };
  return m[t] || t;
}
